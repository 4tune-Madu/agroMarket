{% extends "base.html" %}

{% block content %}

<h2>Edit Product</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <hr>

    <p><strong>Add New Category:</strong></p>
    <input type="text" name="new_category" placeholder="e.g. Organic Produce">

    <br><br>

    {% if form.instance.image %}
        <p>Current Image:</p>
        <img src="{{ form.instance.image.url }}" alt="Product Image" width="150">
        <br><br>
    {% endif %}

    <button type="submit">Update Product</button>
</form>

<br>

<a href="/products/my-products/">← Back to My Products</a>

{% endblock %}
